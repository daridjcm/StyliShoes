<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register - StyliShoes</title>
  <link rel="stylesheet" href="../styles.css" />
</head>

<body>
  <header class="header-container">
    <nav aria-label="breadcrumb">
      <ol class="breadcrumb">
        <li class="breadcrumb-item"><a href="/index.html">Home</a></li>
        <li class="breadcrumb-item active" aria-current="page">
          Register
        </li>
      </ol>
    </nav>
  </header>
  <main>

    <section>
      <form class="form" method="post" action="/api/register" id="form-register">
        <div class="form-group">
          <label for="inputName">Name</label>
          <input type="text" id="inputName" name="name" autocomplete="name" required/>
        </div>
        
        <div class="form-group">
          <label for="inputLastName">Last Name</label>
          <input type="text" id="inputLastName" name="lastname" autocomplete="lastName" required/>
        </div>

        <div class="form-group">
          <label for="inputUsername">Username</label>
          <input type="text" id="inputUsername" name="username" autocomplete="username" required/>
        </div>
        
        <div class="form-group">
          <label for="inputEmail">Email address</label>
          <input type="email" id="inputEmail" name="email" autocomplete="email" required/>
        </div>

        <div class="form-group">
          <label for="inputPassword">Password</label>
          <input type="password" id="inputPassword" name="password" autocomplete="current-password" required/>
        </div>

        <div class="form-group form-check-group">
          <input type="checkbox" id="check" name="terms" required />
          <label for="check">Accept
            <a href="./terms_conditions.html">terms and conditions</a></label>
        </div>

        <button type="submit" id="btn-register">Register</button>
      </form>
    </section>
  </main>
  <footer>
    <p>&copy; StyliShoes - 2024</p>
  </footer>
</body>

</html>
