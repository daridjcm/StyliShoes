<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Products - StyliShoes</title>
  <link rel="stylesheet" href="../styles.css">
</head>

<body>
  <header class="header-container">
    <nav aria-label="breadcrumb">
      <ol class="breadcrumb">
        <li class="breadcrumb-item"><a href="/index.html">Home</a></li>
        <li class="breadcrumb-item active" aria-current="page">Products</li>
      </ol>
      <button id="cart-btn" onclick="openCart()" aria-label="Open shopping cart">
        Cart (<span id="cart-count">0</span>)
      </button>
    </nav>
  </header>

  <main>
    <section>
      <h2>Products</h2>
      <div id="product-list" class="product-grid"></div>
    </section>

    <div id="cart-modal" class="modal-overlay" aria-hidden="true" role="dialog" aria-labelledby="cart-modal-title">
      <div class="modal-dialog">
        <div class="modal-header">
          <h2 id="cart-modal-title">Your Cart</h2>
          <button class="modal-close" onclick="closeCart()" aria-label="Close cart">&times;</button>
        </div>
        <div class="modal-body">
          <ul id="cart-items" class="cart-list"></ul>
        </div>
        <div class="modal-footer">
          <button id="checkout-btn">Buy</button>
          <button id="invoice-btn">Download Invoice</button>
          <p>Total: $<span id="cart-total-price">0</span></p>
        </div>
      </div>
    </div>
  </main>

  <footer>
    <p>&copy; StyliShoes - 2024</p>
  </footer>

  <script src="../../server/controllers/index.js"></script>
  <script src="../../server/controllers/cart.js"></script>
</body>

</html>
