<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Products - StyliShoes</title>
  <meta name="description" content="Products - StyliShoes">
  <script src="https://kit.fontawesome.com/5b68f5cc79.js" crossorigin="anonymous"></script>
  <link rel="stylesheet" href="../styles.css">
  <link rel="icon" href="../images/logo/stylishoes-isotype.svg" type="image/svg+xml">
</head>

<body>
  <header class="header-container">
    <nav aria-label="breadcrumb">
      <img src="../images/logo/stylishoes-imagotype.svg" alt="StyliShoes" id="logo"/>
      <ol class="breadcrumb">
        <li class="breadcrumb-item"><a href="/index.html">Home</a></li>
        <li class="breadcrumb-item active" aria-current="page">Products</li>
      </ol>
      <button id="cart-btn" aria-label="Open shopping cart">
        Cart (<span id="cart-count">0</span>)
      </button>
    </nav>
  </header>

  <main>
    <section>
      <h2>Products</h2>
      <div id="product-list" class="product-grid"></div>
    </section>

    <div id="cart-modal" class="modal-overlay" aria-hidden="true" role="dialog" aria-labelledby="cart-modal-title">
      <div class="modal-dialog">
        <div class="modal-header">
          <h2 id="cart-modal-title">Your Cart</h2>
          <button id="cart-close-btn" class="modal-close" aria-label="Close cart"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div class="modal-body">
          <ul id="cart-items" class="cart-list"></ul>
        </div>
        <div class="modal-footer">
          <button id="checkout-btn">Buy</button>
          <button id="invoice-btn">Download Invoice <i class="fa-solid fa-download"></i></button>
          <p>Total: $<span id="cart-total-price">0</span></p>
        </div>
      </div>
    </div>
  </main>

  <footer>
    <p>&copy; StyliShoes - 2026</p>
    <a href="./terms_conditions.html">Terms and Conditions</a>
  </footer>

  <script type="module" src="../../server/controllers/cart.js"></script>
</body>

</html>
