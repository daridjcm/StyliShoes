<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Products - StyliShoes</title>
  <link rel="stylesheet" href="../styles.css">
</head>
<body>
  <section>
      <header class="page-header">
        <nav aria-label="breadcrumb">
          <ol class="breadcrumb">
            <li class="breadcrumb-item"><a href="/index.html">Home</a></li>
            <li class="breadcrumb-item active" aria-current="page">Products</li>
          </ol>
        </nav>
        <button type="button" id="cart-btn" onclick="openCart()">
          Cart (<span id="cart-count">0</span>)
        </button>
      </header>

      <div id="product-list" class="product-grid">
      </div>
    </div>
  </section>
  <div id="cartModal" class="modal-overlay" aria-hidden="true">
    <div class="modal-dialog" role="dialog" aria-labelledby="cartModalLabel" aria-modal="true">
      <div class="modal-content">
        <div class="modal-header">
          <button type="button" class="modal-close" onclick="closeCart()" aria-label="Close">&times;</button>
        </div>
        <div class="modal-body">
          <h2 id="cartModalLabel">Your Cart</h2>
          <ul id="cart-items" class="cart-list">
          </ul>
        </div>
        <div class="modal-footer">
          <button type="button" id="checkout-btn">Buy</button>
          <button type="button" id="invoice-btn">Download Invoice</button>
          <p>Total: $<span id="cart-total-price">0</span></p>
        </div>
      </div>
    </div>
  </div>
  <footer>&copy; StyliShoes - 2024</footer>
  <script src="../index.js"></script>
  <script src="../cart.js"></script>
</body>
</html>
