<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - StyliShoes</title>
  <meta name="description" content="Login - StyliShoes">
  <link rel="stylesheet" href="../styles.css" />
  <link rel="icon" href="../images/logo/stylishoes-isotype.svg" type="image/svg+xml">
</head>

<body>
  <header class="header-container">
    <nav aria-label="breadcrumb">
      <img src="../images/logo/stylishoes-imagotype.svg" alt="StyliShoes" id="logo"/>
      <ol class="breadcrumb">
        <li class="breadcrumb-item"><a href="/index.html">Home</a></li>
        <li class="breadcrumb-item active" aria-current="page">
          Login
        </li>
      </ol>
    </nav>
  </header>
  <main>

    <section>
      <form class="form" method="post" action="/api/login" id="form-login">
        <div class="form-group">
          <label for="inputUsername">Username</label>
          <input type="text" id="inputUsername" name="username" autocomplete="username" required />
        </div>
        
        <div class="form-group">
          <label for="inputEmail">Email address</label>
          <input type="email" id="inputEmail" name="email" autocomplete="email" required />
        </div>

        <div class="form-group">
          <label for="inputPassword">Password</label>
          <input type="password" id="inputPassword" name="password" autocomplete="current-password" required />
        </div>

        <div class="form-group form-check-group">
          <input type="checkbox" id="check" name="terms" required />
          <label for="check">Accept
            <a href="./terms_conditions.html">terms and conditions</a></label>
        </div>

        <button type="submit" id="btn-login">Login</button>
      </form>
    </section>
  </main>
  <footer>
    <p>&copy; StyliShoes - 2024</p>
    <a href="./terms_conditions.html">Terms and Conditions</a>
  </footer>
  <script type="module" src="../../server/controllers/forms.js"></script>
</body>

</html>
